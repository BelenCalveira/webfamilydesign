<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - FD</title>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="img/logo.png" alt="Logo FD">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="about.html">Nosotros</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact">
            <div class="contact-info">
                <h1>Información de Contacto</h1>
                <ul>
                    <li><strong>Teléfono:</strong> 1167086451</li>
                    <li><strong>País:</strong> Argentina</li>
                    <li><strong>Localidad:</strong> Merlo</li>
                    <li><strong>Código Postal:</strong> 1722</li>
                </ul>
                <h2>WhatsApp</h2>
                 <!-- Inserta aquí el enlace de WhatsApp -->
                 <a href="https://wa.link/0hx7jl" target="_blank">Contactar por WhatsApp</a>
            </div>
            <div class="contact-form">
                <h1>Envíanos tu Consulta</h1>
                <form form method="post" >
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>

                    <label for="correo">Correo:</label>
                    <input type="email" id="correo" name="correo" required>

                    <label for="comentario">Comentario:</label>
                    <textarea id="comentario" name="comentario" rows="4" required></textarea>

                    <button type="submit">Enviar</button>
                </form>
            </div>
        </section>
        <section class="map">
            <!-- Coloca aquí tu mapa de Google Maps o código de mapa interactivo -->
           <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d487.64554471043436!2d-58.754271808446525!3d-34.693194347903045!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2sar!4v1776346780246!5m2!1ses!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </main>
</body>
</html>
